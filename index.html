<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; connect-src 'self' https://generativelanguage.googleapis.com https://www.google-analytics.com https://region1.google-analytics.com https://region1.analytics.google.com https://www.google.com; img-src 'self' data: https://www.google-analytics.com https://www.google.com;">
<title>VisionBox</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-text">
      <h1>VisionBox</h1>
      <span class="brand-sub">
        Inspired by MoeTruyen • Customized by Maditor
      </span>
    </div>
  </div>

  <div class="topbar-controls">
    <div class="field">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="gemini-3.1-flash-lite" selected>gemini-3.1-flash-lite</option>
        <option value="gemini-2.5-flash">gemini-2.5-flash</option>
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
        <option value="__custom__">Other model...</option>
      </select>
      <input type="text" id="model-custom-input" placeholder="custom-model-name" style="display:none" />
    </div>

    <div class="field">
      <label for="api-key-input">Gemini API Key</label>
      <div class="input-with-btn">
        <input type="password" id="api-key-input" placeholder="Enter API key from Google AI Studio" />
        <button id="toggle-key-btn" class="icon-btn" title="Show/hide key"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg></span></button>
        <button type="button" id="get-key-btn" class="icon-btn" title="Get an API key from Google AI Studio"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg></span> Get key</button>
      </div>
    </div>
  </div>
</header>

<section class="lang-bar">
  <div class="lang-bar-row">
    <div class="field">
      <label for="source-lang-select">Source language</label>
      <select id="source-lang-select">
        <option value="ko">Korean (한국어)</option>
        <option value="en">English</option>
        <option value="zh">Chinese (中文)</option>
      </select>
    </div>

    <span class="lang-arrow">&rarr;</span>

    <div class="field">
      <label for="target-lang-select">Translate to</label>
      <select id="target-lang-select">
        <option value="vi">Vietnamese</option>
        <option value="en">English</option>
        <option value="ko">Korean (한국어)</option>
        <option value="zh">Chinese (中文)</option>
        <option value="ja">Japanese</option>
      </select>
    </div>

    <label class="toggle-field" for="skip-sfx-toggle">
      <input type="checkbox" id="skip-sfx-toggle" />
      <span class="toggle-switch"></span>
      <span class="toggle-label">Skip SFX <small>(sound effects, onomatopoeia...)</small></span>
    </label>

    <label class="upload-btn" for="image-input">
      + Add images (max 100)
      <input type="file" id="image-input" accept="image/png,image/jpeg,image/webp,image/heic,image/heif" multiple hidden />
    </label>
  </div>

  <!-- Hàng chứa batch actions + settings, căn đều hai bên -->
  <div class="lang-bar-row lang-bar-row-actions">
    <div class="batch-actions">
      <button id="ocr-batch-btn" class="btn btn-secondary" disabled>OCR all</button>
      <button id="translate-batch-btn" class="btn btn-primary" disabled>Translate all</button>
      <button id="combined-batch-btn" class="btn btn-primary" disabled>OCR + Translate all</button>
      <button id="clear-all-btn" class="btn btn-danger" disabled>Clear all</button>
    </div>

    <div class="right-actions">
      <div class="content-type-dropdown">
        <button type="button" id="content-type-btn" class="btn btn-secondary content-type-btn" title="Content type">
          <span id="content-type-btn-label">Webtoon</span>
          <span class="dropdown-caret"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
        </button>
        <div id="content-type-menu" class="content-type-menu">
          <button type="button" class="content-type-option" data-value="webtoon">Webtoon</button>
          <button type="button" class="content-type-option" data-value="manga">Manga</button>
        </div>
      </div>

      <div class="settings-dropdown">
        <button type="button" id="settings-btn" class="btn btn-secondary settings-btn" title="Settings"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></span> Settings</button>
        <div id="settings-panel" class="settings-panel">
          <div class="field settings-field">
            <label for="theme-select">Theme</label>
            <select id="theme-select">
              <option value="dark">Dark mode</option>
              <option value="light">Light mode</option>
            </select>
          </div>

          <!-- Các cài đặt khác sẽ thêm sau -->
          <div class="settings-divider"></div>
          <button type="button" id="replace-btn" class="btn btn-secondary settings-panel-btn" title="Find and replace (Ctrl+H)">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            Replace
            <span class="settings-shortcut-hint">Ctrl+H</span>
          </button>

          <div class="field settings-field">
            <label for="font-size-value">Font size (OCR &amp; Translation)</label>
            <div class="font-size-control">
              <button type="button" id="font-size-decrease" class="icon-btn font-size-btn" title="Decrease font size">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
              </button>
              <span id="font-size-value" class="font-size-value">14px</span>
              <button type="button" id="font-size-increase" class="icon-btn font-size-btn" title="Increase font size">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
              </button>
            </div>
          </div>

          <div class="settings-divider"></div>
          <button type="button" id="usage-btn" class="btn btn-secondary settings-panel-btn">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></span>
            API usage
          </button>
          <button type="button" id="view-logs-btn" class="btn btn-secondary settings-panel-btn">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></span>
            View logs
          </button>
<button type="button" id="about-btn" class="btn btn-secondary settings-panel-btn">
  <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
  About
</button>

        </div>
      </div>
    </div>
  </div>
</section>

<section id="selection-bar" class="selection-bar" style="display:none">
  <span class="selection-bar-count"><span id="selection-count">0</span> image(s) selected</span>
  <div class="selection-bar-actions">
    <button id="selection-ocr-btn" class="btn btn-secondary">OCR selected</button>
    <button id="selection-translate-btn" class="btn btn-secondary">Translate selected</button>
    <div class="refine-dropdown">
      <button type="button" id="selection-refine-btn" class="btn btn-secondary refine-btn" title="Refine OCR or Translation for selected images">Refine selected</button>
      <div class="refine-menu refine-menu-up">
        <button type="button" id="selection-refine-ocr-btn" class="refine-option" title="Re-scan bubble boundaries to fix split/merged lines">Refine OCR selected</button>
        <button type="button" id="selection-refine-translate-btn" class="refine-option" title="Refine translation for selected images">Refine Translation selected</button>
      </div>
    </div>
    <button id="selection-cancel-btn" class="btn btn-danger">Deselect</button>
  </div>
</section>

<!-- Thanh Find & Replace: tim/thay the tren OCR + ban dich cua tung anh rieng
     le (khong tim trong phan tong hop All OCR / All translations), co the
     replace truc tiep tu thanh nay ma khong can vao Edit mode. -->
<section id="replace-bar" class="replace-bar" style="display:none">
  <div class="replace-bar-row replace-bar-row-main">
    <span class="icon replace-bar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>

    <input type="text" id="replace-find-input" class="replace-input" placeholder="Find..." />
    <span class="replace-bar-arrow">&rarr;</span>
    <input type="text" id="replace-with-input" class="replace-input" placeholder="Replace with..." />

    <span id="replace-match-count" class="replace-match-count">0/0</span>

    <div class="replace-nav-btns">
      <button type="button" id="replace-prev-btn" class="icon-btn replace-nav-btn" title="Previous match">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></span>
      </button>
      <button type="button" id="replace-next-btn" class="icon-btn replace-nav-btn" title="Next match">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </button>
    </div>

    <button type="button" id="replace-close-btn" class="icon-btn replace-close-btn" title="Close">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
    </button>
  </div>

  <div class="replace-bar-row replace-bar-row-options">
    <div class="replace-scope-group">
      <span class="replace-scope-label">Search in:</span>
      <label class="replace-scope-chip">
        <input type="checkbox" id="replace-scope-ocr" checked />
        <span>OCR</span>
      </label>
      <label class="replace-scope-chip">
        <input type="checkbox" id="replace-scope-translation" checked />
        <span>Translation</span>
      </label>
    </div>

    <label class="replace-scope-chip replace-case-chip">
      <input type="checkbox" id="replace-whole-word" checked />
      <span>Whole word</span>
    </label>

    <label class="replace-scope-chip">
      <input type="checkbox" id="replace-case-sensitive" />
      <span>Match case</span>
    </label>

    <div class="replace-bar-actions">
      <button type="button" id="replace-one-btn" class="btn btn-secondary">Replace</button>
      <button type="button" id="replace-all-btn" class="btn btn-primary">Replace all</button>
    </div>
  </div>
</section>

<main id="results-area">
  <div id="dropzone" class="dropzone">
    <div id="placeholder" class="placeholder">
      <p>Drag and drop images here, or click "+ Add images" to start.</p>
    </div>
    <div id="manga-results"></div>
  </div>
</main>

<section id="summary-section" class="summary" style="display:none">
  <div class="summary-col">
    <div class="summary-head">
      <span>All OCR</span>
      <div class="summary-head-actions">
        <button type="button" class="summary-reload-btn" data-reload-target="summary-ocr-all" title="Reload from all images"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></span></button>
        <div class="export-dropdown">
          <button type="button" class="export-btn" data-export-target="summary-ocr-all" data-export-name="ocr-all">Export</button>
          <div class="export-menu">
            <button type="button" class="export-option" data-format="txt">.txt</button>
            <button type="button" class="export-option" data-format="docx">.docx</button>
          </div>
        </div>
        <button type="button" class="edit-mode-btn" data-edit-target="summary-ocr-all">Edit mode</button>
        <button class="copy-btn" data-copy-target="summary-ocr-all">Copy</button>
      </div>
    </div>
    <pre id="summary-ocr-all" class="summary-body empty">No OCR results yet</pre>
  </div>
  <div class="summary-col">
    <div class="summary-head">
      <span>All translations</span>
      <div class="summary-head-actions">
        <button type="button" class="summary-reload-btn" data-reload-target="summary-translation-all" title="Reload from all images"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></span></button>
        <div class="export-dropdown">
          <button type="button" class="export-btn" data-export-target="summary-translation-all" data-export-name="translation-all">Export</button>
          <div class="export-menu">
            <button type="button" class="export-option" data-format="txt">.txt</button>
            <button type="button" class="export-option" data-format="docx">.docx</button>
          </div>
        </div>
        <button type="button" class="edit-mode-btn" data-edit-target="summary-translation-all">Edit mode</button>
        <button class="copy-btn" data-copy-target="summary-translation-all">Copy</button>
      </div>
    </div>
    <pre id="summary-translation-all" class="summary-body empty">No translations yet</pre>
  </div>
</section>

<div id="nav-fab" class="nav-fab">
  <div id="nav-fab-panel" class="nav-fab-panel">
    <div id="nav-fab-selection-head" class="nav-fab-selection-head" style="display:none">
      <span id="nav-fab-selection-count">0 selected</span>
      <div class="nav-fab-selection-actions">
        <button type="button" id="nav-fab-selection-all">Select all</button>
        <button type="button" id="nav-fab-selection-clear">Clear</button>
      </div>
    </div>
    <div id="nav-fab-list" class="nav-fab-list"></div>
    <div class="nav-fab-jump-row">
      <button id="nav-fab-top" class="nav-fab-jump-btn" title="Scroll to top">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg></span>
      </button>
      <button id="nav-fab-bottom" class="nav-fab-jump-btn" title="Scroll to bottom">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg></span>
      </button>
    </div>
  </div>
  <div id="nav-fab-toggle-wrap" class="nav-fab-toggle-wrap">
  <div id="nav-fab-toggle" class="nav-fab-toggle" title="Image list" role="button" tabindex="0">
    <span class="nav-fab-toggle-icon">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></span>
    </span>
    <div class="nav-fab-progress">
      <span class="nav-fab-progress-track">
        <span id="batch-progress-fill" class="batch-progress-fill"></span>
      </span>
      <span class="nav-fab-progress-text"><span id="batch-current">0</span>/<span id="batch-total">0</span></span>
      <button type="button" id="batch-stop-btn" class="batch-stop-btn" title="Stop after current image">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
      </button>
    </div>
    <div class="nav-fab-toast">
      <span id="nav-fab-toast-dot" class="nav-fab-toast-dot"></span>
      <span id="nav-fab-toast-text" class="nav-fab-toast-text"></span>
    </div>
    <div class="nav-fab-confirm">
      <span id="nav-fab-confirm-text" class="nav-fab-confirm-text">Are you sure?</span>
      <div class="nav-fab-confirm-actions">
        <button type="button" id="nav-fab-confirm-yes" class="nav-fab-confirm-btn nav-fab-confirm-yes">Yes</button>
        <button type="button" id="nav-fab-confirm-no" class="nav-fab-confirm-btn nav-fab-confirm-no">No</button>
      </div>
    </div>
    <div class="nav-fab-prompt">
      <input 
  type="text" 
  id="nav-fab-prompt-input" 
  class="nav-fab-prompt-input" 
  placeholder="Prompt..." 
  autocomplete="off" 
  autocorrect="off" 
  autocapitalize="off" 
  spellcheck="false" 
  data-lpignore="true"
>
      <div class="nav-fab-prompt-actions">
        <button type="button" id="nav-fab-prompt-cancel" class="nav-fab-prompt-btn nav-fab-prompt-cancel">Cancel</button>
        <button type="button" id="nav-fab-prompt-run" class="nav-fab-prompt-btn nav-fab-prompt-run">Refine</button>
      </div>
    </div>
  </div>
  <button type="button" id="nav-fab-error-badge" class="nav-fab-error-badge" title="Jump to error images">0</button>
  </div>
</div>
<div id="nav-fab-scrim" class="nav-fab-scrim"></div>

<div id="info-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box info-modal-box">
    <div class="info-modal-head">
      <h2 id="info-modal-title">Info</h2>
      <button type="button" id="info-modal-close" class="icon-btn" title="Close">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
      </button>
    </div>
    <div id="info-modal-body" class="info-modal-body"></div>
  </div>
</div>


<script src="jszip.min.js"></script>
<script src="preload.js"></script>
<script src="renderer.js"></script>
</body>
</html>
